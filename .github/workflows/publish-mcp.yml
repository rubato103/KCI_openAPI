name: Publish to PyPI + MCP Registry

# 버전 태그 푸시 시 PyPI(Trusted Publishing/OIDC) 게시 후 공식 MCP 레지스트리에 발행.
# 사전 1회 설정(웹 UI): PyPI 프로젝트에 GitHub Trusted Publisher 등록(이 repo/워크플로).
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC: PyPI Trusted Publishing + mcp-publisher github-oidc
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (Trusted Publishing, OIDC)
        run: uv publish
        # 토큰 방식 대안: run: uv publish --token ${{ secrets.PYPI_API_TOKEN }}

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
